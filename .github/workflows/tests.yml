name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Type-check
        run: python -m mypy src tests

      - name: Test
        run: python -m pytest --cov=oci_apm_mcp --cov-report=term-missing --cov-fail-under=90

      - name: Build package
        run: python -m build

      - name: Reject credential-like files
        shell: bash
        run: |
          if find . -type f \( -name '*.pem' -o -name '*.key' -o -name '*.p12' -o -name '*.pfx' \) -print -quit | grep -q .; then
            echo 'Credential-like file detected.' >&2
            exit 1
          fi
