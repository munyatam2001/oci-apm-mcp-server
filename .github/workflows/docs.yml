name: docs-baseline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required design documents
        shell: bash
        run: |
          test -f README.md
          test -f AGENTS.md
          test -f docs/ARCHITECTURE.md
          test -f docs/SECURITY.md
          test -f docs/IAM_SETUP.md
          test -f docs/TOOL_CATALOG.md
          test -f docs/DEVELOPMENT_PLAN.md

      - name: Reject common credential file types
        shell: bash
        run: |
          if find . -type f \( -name '*.pem' -o -name '*.key' -o -name '*.p12' -o -name '*.pfx' \) -print -quit | grep -q .; then
            echo 'Credential-like file detected.' >&2
            exit 1
          fi

# Milestone 1 will replace this docs-only gate with lint, type-check, unit-test,
# package-build, and secret-scanning jobs.
